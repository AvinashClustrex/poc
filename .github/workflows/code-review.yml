name: Required Reviewers Check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

# 👈 THIS IS THE KEY FIX
permissions:
  checks: write          # Create status checks
  pull-requests: read    # Read PR reviews  
  contents: read         # Read repo contents
  statuses: write        # Update commit statuses

jobs:
  check-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Reviewers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_REVIEWERS: ${{ secrets.REQUIRED_REVIEWERS }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          SHA="${{ github.sha }}"
          
          echo "PR #$PR_NUMBER - SHA: $SHA"
          
          if [[ -z "$REQUIRED_REVIEWERS" ]]; then
            curl -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
              -d '{"state":"success","context":"Required Reviewers","description":"No reviewers required"}'
            exit 0
          fi
          
          # Get reviews
          REVIEWS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews")
          
          APPROVED=$(echo "$REVIEWS" | jq -r '.[] | select(.state=="APPROVED") | .user.login' 2>/dev/null | grep -v '^$')
          
          MISSING=()
          for reviewer in $(echo "$REQUIRED_REVIEWERS" | tr ',' '\n' | xargs); do
            if ! echo "$APPROVED" | grep -q "^$reviewer$"; then
              MISSING+=("$reviewer")
            fi
          done
          
          if [ ${#MISSING[@]} -eq 0 ]; then
            STATE="success"
            DESC="All required reviewers approved"
          else
            STATE="failure" 
            DESC="Missing: ${MISSING[*]}"
          fi
          
          curl -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
            -d "{\"state\":\"$STATE\",\"context\":\"Required Reviewers\",\"description\":\"$DESC\"}"
