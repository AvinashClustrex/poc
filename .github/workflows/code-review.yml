name: Required Reviewers Check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  checks: write
  pull-requests: read
  contents: read
  statuses: write

jobs:
  check-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Reviewers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_REVIEWERS: ${{ secrets.REQUIRED_REVIEWERS || '' }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          SHA="${{ github.sha }}"
          
          echo "Checking PR #$PR_NUMBER"
          
          # Set PENDING status first
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
            -d '{"state":"pending","context":"Required Reviewers","description":"Checking reviewers..."}' > /dev/null
          
          # Skip if no reviewers required
          if [[ -z "$REQUIRED_REVIEWERS" ]]; then
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
              -d '{"state":"success","context":"Required Reviewers","description":"No reviewers required"}' > /dev/null
            exit 0
          fi
          
          # Get reviews SAFELY
          REVIEWS=$(curl -s -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews?per_page=100")
          
          HTTP_CODE=${REVIEWS: -3}
          REVIEWS_BODY=${REVIEWS%???}
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "API error: HTTP $HTTP_CODE"
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
              -d '{"state":"error","context":"Required Reviewers","description":"API error"}' > /dev/null
            exit 1
          fi
          
          APPROVED=$(echo "$REVIEWS_BODY" | jq -r '.[]? | select(.state=="APPROVED") | .user.login' 2>/dev/null || echo "")
          
          echo "Approved: '$APPROVED'"
          echo "Required: '$REQUIRED_REVIEWERS'"
          
          # Check reviewers
          MISSING_COUNT=0
          for reviewer in $(echo "$REQUIRED_REVIEWERS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            if [[ -n "$reviewer" && "$APPROVED" != *"$reviewer"* ]]; then
              ((MISSING_COUNT++))
            fi
          done
          
          if [[ $MISSING_COUNT -eq 0 ]]; then
            STATE="success"
            DESC="All required reviewers approved ✅"
          else
            STATE="failure"
            DESC="Missing $MISSING_COUNT required approvals ❌"
          fi
          
          echo "Status: $STATE - $DESC"
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
            -d "{\"state\":\"$STATE\",\"context\":\"Required Reviewers\",\"description\":\"$DESC\"}" > /dev/null
          
          # 👈 REMOVED: [[ "$STATE" == "failure" ]] && exit 1
          echo "✅ Status check set successfully"
